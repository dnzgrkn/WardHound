services:
  api:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env, see .env.example}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL in .env, see .env.example}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      WARDHOUND_API_KEY: ${WARDHOUND_API_KEY:?set WARDHOUND_API_KEY in .env, see .env.example}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AD_LDAP_URL: ${AD_LDAP_URL:-}
      AD_BIND_DN: ${AD_BIND_DN:-}
      AD_BIND_PASSWORD: ${AD_BIND_PASSWORD:-}
      AD_USER_SEARCH_BASE_DN: ${AD_USER_SEARCH_BASE_DN:-}
      AD_REAL_EXECUTION: ${AD_REAL_EXECUTION:-false}
      DUO_API_HOSTNAME: ${DUO_API_HOSTNAME:-}
      DUO_INTEGRATION_KEY: ${DUO_INTEGRATION_KEY:-}
      DUO_SECRET_KEY: ${DUO_SECRET_KEY:-}
      DUO_REAL_EXECUTION: ${DUO_REAL_EXECUTION:-false}
      FMC_BASE_URL: ${FMC_BASE_URL:-}
      FMC_USERNAME: ${FMC_USERNAME:-}
      FMC_PASSWORD: ${FMC_PASSWORD:-}
      FMC_BLOCKLIST_NETWORK_GROUP_ID: ${FMC_BLOCKLIST_NETWORK_GROUP_ID:-}
      FMC_REAL_EXECUTION: ${FMC_REAL_EXECUTION:-false}
      JUMPSERVER_BASE_URL: ${JUMPSERVER_BASE_URL:-}
      JUMPSERVER_API_TOKEN: ${JUMPSERVER_API_TOKEN:-}
      JUMPSERVER_REAL_EXECUTION: ${JUMPSERVER_REAL_EXECUTION:-false}
      PACKETFENCE_BASE_URL: ${PACKETFENCE_BASE_URL:-}
      PACKETFENCE_API_TOKEN: ${PACKETFENCE_API_TOKEN:-}
      PACKETFENCE_ISOLATION_SECURITY_EVENT_ID: ${PACKETFENCE_ISOLATION_SECURITY_EVENT_ID:-}
      PACKETFENCE_REAL_EXECUTION: ${PACKETFENCE_REAL_EXECUTION:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4318}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
      VITE_WS_BASE_URL: ws://localhost:8000/api/v1
      VITE_API_KEY: ${WARDHOUND_API_KEY:?set WARDHOUND_API_KEY in .env, see .env.example}
      VITE_AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      VITE_AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      VITE_AUTH0_CLIENT_ID: ${AUTH0_CLIENT_ID:-}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wardhound}
      POSTGRES_USER: ${POSTGRES_USER:-wardhound}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env, see .env.example}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL in .env, see .env.example}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL in .env, see .env.example}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:?set CELERY_BROKER_URL in .env, see .env.example}
    command: ["/bin/sh", "-c", "celery --broker=\"$$CELERY_BROKER_URL\" worker --loglevel=info"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:1.68.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v3.5.0
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana:12.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env, see .env.example}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  frontend_node_modules:
  grafana_data:
